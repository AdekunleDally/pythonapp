name: Python CI

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop
env:
    PYTHON_VERSION: 3.12
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{env.PYTHON_VERSION}}

            - name: Install Dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
            - name: Run Tests
              run: pytest
